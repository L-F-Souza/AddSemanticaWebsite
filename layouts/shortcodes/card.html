{{ $color := .Get "color" | default "orange" }}
{{ $title := .Get "title" | default "" }}
{{ $icon  := .Get "icon"  | default "" }}
<div class="sc-card sc-card--{{ $color }}">
  {{ if $icon }}<div class="sc-card__icon">{{ $icon }}</div>{{ end }}
  {{ if $title }}<h3 class="sc-card__title">{{ $title }}</h3>{{ end }}
  <div class="sc-card__body">{{ .Inner | markdownify }}</div>
</div>
