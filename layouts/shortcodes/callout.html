{{ $type  := .Get "type"  | default "info" }}
{{ $title := .Get "title" | default "" }}
{{ $icons := dict "info" "ℹ" "tip" "✓" "warning" "⚠" "danger" "✕" }}
{{ $icon  := index $icons $type }}
<div class="callout callout--{{ $type }}">
  <span class="callout__icon">{{ $icon }}</span>
  <div class="callout__body">
    {{ if $title }}<strong class="callout__title">{{ $title }}</strong>{{ end }}
    <div class="callout__text">{{ .Inner | markdownify }}</div>
  </div>
</div>
