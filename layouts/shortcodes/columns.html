{{ $ratio := .Get "ratio" | default "golden" }}
{{ $parts := split .Inner "---split---" }}
<div class="sc-columns sc-columns--{{ $ratio }}">
  <div class="sc-columns__left">{{ index $parts 0 | markdownify }}</div>
  <div class="sc-columns__right">{{ if gt (len $parts) 1 }}{{ index $parts 1 | markdownify }}{{ end }}</div>
</div>
