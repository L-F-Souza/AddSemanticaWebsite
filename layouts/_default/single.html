{{ define "main" }}

<!-- ═══════════════════════════════════════════════════
     LAYOUT: Default single page
     USED BY: Any page without a specific layout
     CONTENT FILES: content/*.md
════════════════════════════════════════════════════ -->

<div class="page-header">
  <div>
    <p class="page-header-eyebrow">{{ .Params.eyebrow }}</p>
    <h1>{{ .Title | safeHTML }}</h1>
  </div>
  <div class="page-header-right">
    <p>{{ .Params.lead }}</p>
  </div>
</div>

<div class="page-content">
  {{ .Content }}
</div>

{{ end }}
